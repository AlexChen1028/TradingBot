services:
  trading-bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - SYMBOL=BTC
    volumes:
      - ./btc_model_wf.pt:/app/btc_model_wf.pt
      - ./btc_scaler_wf.pkl:/app/btc_scaler_wf.pkl
      - ./btc_4h_model_wf.pt:/app/btc_4h_model_wf.pt
      - ./btc_4h_scaler_wf.pkl:/app/btc_4h_scaler_wf.pkl
      - ./btc_state.json:/app/btc_state.json
      - ./btc_bot.log:/app/btc_bot.log

  eth-bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - SYMBOL=ETH
      - LONG_FLAT_ONLY=false
    volumes:
      - ./eth_model_wf.pt:/app/eth_model_wf.pt
      - ./eth_scaler_wf.pkl:/app/eth_scaler_wf.pkl
      - ./eth_4h_model_wf.pt:/app/eth_4h_model_wf.pt
      - ./eth_4h_scaler_wf.pkl:/app/eth_4h_scaler_wf.pkl
      - ./eth_state.json:/app/eth_state.json
      - ./eth_bot.log:/app/eth_bot.log

  sol-bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - SYMBOL=SOL
      - MULTI_TF=false
    volumes:
      - ./sol_model_wf.pt:/app/sol_model_wf.pt
      - ./sol_scaler_wf.pkl:/app/sol_scaler_wf.pkl
      - ./sol_state.json:/app/sol_state.json
      - ./sol_bot.log:/app/sol_bot.log

  coin-monitor:
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./monitor_coins.py:/app/monitor_coins.py
      - ./scan_coins.py:/app/scan_coins.py
      - ./positions_altcoin.json:/app/positions_altcoin.json
    command: python -u monitor_coins.py
